<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Soft feminine poetry business banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8E6E6"/>
      <stop offset="0.5" stop-color="#F4EDE5"/>
      <stop offset="1" stop-color="#EEE5DE"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 260) rotate(90) scale(360 520)">
      <stop stop-color="#FFF9F5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFF9F5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8F4EF"/>
      <stop offset="1" stop-color="#F2E9E1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCF8F4"/>
      <stop offset="1" stop-color="#F6EDE7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#B58F8F" flood-opacity="0.24"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B58F8F" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#lightGlow)"/>

  <!-- soft fabric layers -->
  <path d="M0 1030C175 960 275 1088 464 1030C640 976 747 1060 1080 972V1350H0V1030Z" fill="#F1E6DF" fill-opacity="0.9"/>
  <path d="M0 1120C235 1046 410 1155 602 1098C773 1048 883 1115 1080 1070V1350H0V1120Z" fill="#EADDD5" fill-opacity="0.8"/>

  <!-- floral corners -->
  <g opacity="0.72">
    <ellipse cx="112" cy="145" rx="36" ry="22" fill="#D9B8B8" transform="rotate(-20 112 145)"/>
    <ellipse cx="164" cy="122" rx="34" ry="20" fill="#E0C5BA" transform="rotate(20 164 122)"/>
    <ellipse cx="202" cy="172" rx="31" ry="18" fill="#CBBDAF" transform="rotate(-10 202 172)"/>
    <path d="M94 197C120 174 152 175 177 197C150 215 120 216 94 197Z" fill="#CDA8AE"/>
    <path d="M170 219C196 196 228 197 253 219C226 237 196 238 170 219Z" fill="#CABFAF"/>
  </g>

  <g opacity="0.55">
    <ellipse cx="944" cy="198" rx="35" ry="21" fill="#DDB8BE" transform="rotate(22 944 198)"/>
    <ellipse cx="897" cy="154" rx="32" ry="19" fill="#CDB7A8" transform="rotate(-16 897 154)"/>
    <ellipse cx="858" cy="220" rx="30" ry="18" fill="#E0CBC0" transform="rotate(8 858 220)"/>
    <path d="M915 248C940 228 970 230 993 250C970 266 941 267 915 248Z" fill="#C5B89D"/>
  </g>

  <!-- framed poem -->
  <g filter="url(#softShadow)">
    <rect x="310" y="285" width="460" height="620" rx="16" fill="#D8C5B7"/>
    <rect x="336" y="313" width="408" height="565" rx="10" fill="url(#frameGrad)"/>
    <rect x="360" y="340" width="360" height="516" rx="8" fill="#FFFCF9"/>
  </g>

  <text x="540" y="418" text-anchor="middle" fill="#8C6D67" font-family="'Times New Roman', Georgia, serif" font-size="26" letter-spacing="1.2">A PERSONAL POEM</text>
  <line x1="420" y1="438" x2="660" y2="438" stroke="#D8C5B9" stroke-width="1.5"/>
  <text x="540" y="492" text-anchor="middle" fill="#B08883" font-family="cursive" font-size="44">For Your Heart</text>
  <text x="540" y="542" text-anchor="middle" fill="#9C7B73" font-family="'Times New Roman', Georgia, serif" font-size="24">Words wrapped in warmth</text>
  <text x="540" y="590" text-anchor="middle" fill="#A88A83" font-family="'Times New Roman', Georgia, serif" font-size="21">for moments too deep to explain.</text>
  <line x1="435" y1="622" x2="645" y2="622" stroke="#E1D2C8" stroke-width="1.2"/>

  <!-- poem card -->
  <g filter="url(#tinyShadow)" transform="rotate(-8 275 820)">
    <rect x="135" y="715" width="280" height="190" rx="12" fill="url(#cardGrad)"/>
    <text x="275" y="778" text-anchor="middle" fill="#9C7A73" font-family="'Times New Roman', Georgia, serif" font-size="24">Printed Poem</text>
    <line x1="195" y1="795" x2="355" y2="795" stroke="#D7C3B8" stroke-width="1.2"/>
    <line x1="190" y1="826" x2="360" y2="826" stroke="#CFBCAF" stroke-width="1"/>
    <line x1="190" y1="848" x2="360" y2="848" stroke="#D9C8BC" stroke-width="1"/>
    <line x1="190" y1="870" x2="335" y2="870" stroke="#E0D0C5" stroke-width="1"/>
  </g>

  <!-- optional decor lantern -->
  <g opacity="0.82" filter="url(#tinyShadow)">
    <rect x="806" y="748" width="110" height="150" rx="20" fill="#EEDFD4"/>
    <rect x="822" y="774" width="78" height="102" rx="14" fill="#F8F1EB"/>
    <ellipse cx="861" cy="732" rx="28" ry="12" fill="#DAC6B9"/>
    <circle cx="861" cy="825" r="18" fill="#F7E8C5"/>
  </g>

  <!-- text content -->
  <text x="540" y="964" text-anchor="middle" fill="#8D6D68" font-family="'Times New Roman', Georgia, serif" font-size="34" letter-spacing="0.6">
    Amal Mardiya – Poems &amp; Designs
  </text>

  <text x="540" y="1038" text-anchor="middle" fill="#7A5955" font-family="'Times New Roman', Georgia, serif" font-size="78" font-weight="600">
    Personalised Poems
  </text>

  <text x="540" y="1098" text-anchor="middle" fill="#9A7972" font-family="cursive" font-size="42">
    When ordinary words aren’t enough,
  </text>
  <text x="540" y="1142" text-anchor="middle" fill="#9A7972" font-family="cursive" font-size="42">
    let a poem speak for you.
  </text>

  <text x="540" y="1198" text-anchor="middle" fill="#8D6D66" font-family="'Times New Roman', Georgia, serif" font-size="28">
    Poems for weddings, remembrance, love, and special moments
  </text>
  <text x="540" y="1234" text-anchor="middle" fill="#8D6D66" font-family="'Times New Roman', Georgia, serif" font-size="28">
    Available as digital or beautifully framed keepsakes
  </text>

  <!-- button -->
  <g filter="url(#tinyShadow)">
    <rect x="365" y="1260" width="350" height="64" rx="32" fill="#D9B8B2"/>
    <text x="540" y="1302" text-anchor="middle" fill="#FFF9F7" font-family="'Times New Roman', Georgia, serif" font-size="34" font-weight="600">
      Order Your Poem
    </text>
  </g>
</svg>
